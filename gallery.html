<style>

/* ================= BASE ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
  background:#0b0f1a;
  color:white;
  overflow-x:hidden;
}

/* ================= APPLE GLASS NAVBAR ================= */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 5%;
  background:rgba(20,20,30,0.6);
  backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  position:sticky;
  top:0;
  z-index:100;
}

.nav-links{
  display:flex;
  list-style:none;
  gap:18px;
}

.nav-links a{
  color:rgba(255,255,255,0.8);
  text-decoration:none;
  font-size:14px;
  transition:0.3s;
}

.nav-links a:hover{
  color:white;
}

/* ================= HERO (NETFLIX STYLE) ================= */
.hero{
  padding:40px 20px 10px;
  text-align:center;
}

.hero h1{
  font-size:38px;
  font-weight:600;
  letter-spacing:1px;
  background:linear-gradient(90deg,#fff,#a1a1ff,#22c55e);
  -webkit-background-clip:text;
  color:transparent;
}

.hero p{
  opacity:0.6;
  margin-top:8px;
  font-size:14px;
}

/* ================= SLIDER ================= */
.slider{
  width:95%;
  max-width:1200px;
  margin:30px auto;
  overflow:hidden;
  border-radius:20px;
  position:relative;
}

/* TRACK */
.slides{
  display:flex;
  transition:transform 1s cubic-bezier(0.25,1,0.5,1);
}

/* SLIDE */
.slide{
  min-width:100%;
  height:600px;
  position:relative;
}

/* IMAGE (NETFLIX FULL FOCUS) */
.slide img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.05);
  filter:brightness(0.85) contrast(1.1);
  transition:1s ease;
}

/* ================= APPLE LIGHT OVERLAY ================= */
.slide::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 60%);
  pointer-events:none;
}

/* ================= LIGHTNING HOVER ================= */
.slide::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.3),
    transparent
  );
  transform:translateX(-120%);
}

.slide:hover::before{
  animation:shine 0.8s ease;
}

@keyframes shine{
  0%{transform:translateX(-120%);}
  100%{transform:translateX(120%);}
}

.slide:hover img{
  transform:scale(1.12);
  filter:brightness(1) contrast(1.2);
}

/* ================= BUTTONS ================= */
.btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(255,255,255,0.08);
  border:none;
  color:white;
  font-size:20px;
  padding:12px 16px;
  border-radius:50%;
  cursor:pointer;
  transition:0.3s;
  backdrop-filter:blur(10px);
}

.btn:hover{
  background:rgba(255,255,255,0.2);
  transform:translateY(-50%) scale(1.1);
}

.prev{left:15px;}
.next{right:15px;}

/* ================= WHATSAPP ================= */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  color:white;
  animation:float 2s infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

/* ================= MOBILE ================= */
@media(max-width:768px){
  .slide{height:350px;}
  .hero h1{font-size:26px;}
}

</style>
</head>

<script>

const track = document.getElementById("track");
const slides = document.querySelectorAll(".slide");
let index = 0;

function move(){
  track.style.transform = `translateX(-${index * 100}%)`;
}

document.querySelector(".next").addEventListener("click", ()=>{
  index = (index + 1) % slides.length;
  move();
});

document.querySelector(".prev").addEventListener("click", ()=>{
  index = (index - 1 + slides.length) % slides.length;
  move();
});

/* AUTO SLIDE 3s */
setInterval(()=>{
  index = (index + 1) % slides.length;
  move();
},3000);

</script>
