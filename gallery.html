<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Gallery - Advanced Academy Shamli</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ================= BASE ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
  background:#0b0f1a;
  color:white;
  overflow-x:hidden;
}

/* ================= BACKGROUND LIGHT ================= */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(79,70,229,0.25), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(34,197,94,0.15), transparent 40%),
    radial-gradient(circle at 50% 80%, rgba(250,204,21,0.10), transparent 40%);
  filter:blur(90px);
  z-index:-1;
}

/* ================= NAVBAR ================= */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 5%;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(16px);
  position:sticky;
  top:0;
  z-index:100;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.nav-links{
  display:flex;
  list-style:none;
  gap:18px;
}

.nav-links a{
  color:rgba(255,255,255,0.8);
  text-decoration:none;
  font-size:14px;
}

/* ================= HERO ================= */
.hero{
  text-align:center;
  padding:35px 10px;
}

.hero h1{
  font-size:34px;
  background:linear-gradient(90deg,#fff,#a1a1ff,#22c55e);
  -webkit-background-clip:text;
  color:transparent;
}

/* ================= SLIDER ================= */
.slider{
  width:95%;
  max-width:1200px;
  margin:20px auto;
  overflow:hidden;
  border-radius:22px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.08);
  position:relative;
}

/* TRACK */
.slides{
  display:flex;
  transition:transform 1s cubic-bezier(0.25,1,0.5,1);
}

/* SLIDE FRAME (IMPORTANT FIX) */
.slide{
  min-width:100%;
  height:650px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle at center, rgba(255,255,255,0.05), transparent 70%);
  position:relative;
}

/* ================= IMPORTANT FIX HERE ================= */
/* NO CROPPING ANY IMAGE */
.slide img{
  width:100%;
  height:100%;
  object-fit:contain;   /* 🔥 FIXED: NO CROPPING EVER */
  padding:20px;
  transition:1s ease;
  filter:brightness(0.9) contrast(1.1);
}

/* ================= LIGHTNING BORDER ================= */
.slide::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.2),transparent);
  transform:translateX(-120%);
}

.slide:hover::before{
  animation:shine 0.8s ease;
}

@keyframes shine{
  0%{transform:translateX(-120%);}
  100%{transform:translateX(120%);}
}

.slide:hover img{
  transform:scale(1.02);
  filter:brightness(1.1);
}

/* ================= BUTTONS ================= */
.btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(255,255,255,0.08);
  border:none;
  color:white;
  font-size:20px;
  padding:12px 14px;
  border-radius:50%;
  cursor:pointer;
  backdrop-filter:blur(10px);
}

.btn:hover{
  background:rgba(255,255,255,0.2);
}

.prev{left:15px;}
.next{right:15px;}

/* ================= FOOTER (BEAST UPGRADE) ================= */
footer{
  margin-top:40px;
  padding:30px 10px;
  text-align:center;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border-top:1px solid rgba(255,255,255,0.1);
  position:relative;
}

/* animated border */
footer::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,#4F46E5,#22c55e,#FACC15,#4F46E5);
  opacity:0.3;
  filter:blur(8px);
  animation:footerGlow 6s linear infinite;
}

@keyframes footerGlow{
  0%{background-position:0%;}
  100%{background-position:100%;}
}

footer p{
  position:relative;
  font-size:14px;
  letter-spacing:1px;
  opacity:0.9;
}

footer span{
  color:#22c55e;
  font-weight:600;
}

/* ================= WHATSAPP ================= */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#25D366;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  color:white;
  animation:float 2s infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

/* ================= MOBILE ================= */
@media(max-width:768px){
  .slide{height:380px;}
  .hero h1{font-size:24px;}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">Advanced Academy</div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="courses.html">Courses</a></li>
    <li><a href="results.html">Results</a></li>
    <li><a href="teachers.html">Teachers</a></li>
    <li><a href="gallery.html">Gallery</a></li>
    <li><a href="reviews.html">Reviews</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Advanced Academy Visual Experience</h1>
</section>

<!-- SLIDER -->
<div class="slider">
  <button class="btn prev">&#10094;</button>

  <div class="slides" id="track">

    <div class="slide"><img src="advanced.webp"></div>
    <div class="slide"><img src="gallery1.jpg.png"></div>
    <div class="slide"><img src="gallery5.jpeg"></div>
    <div class="slide"><img src="Academy image1.jpg"></div>
    <div class="slide"><img src="Academy image2.jpg"></div>
    <div class="slide"><img src="Academy image3.jpg"></div>
    <div class="slide"><img src="Academy image 4.jpg"></div>
    <div class="slide"><img src="Academy image 5.jpg"></div>
    <div class="slide"><img src="Academy image 6.jpg"></div>
    <div class="slide"><img src="Academy image 7.jpg"></div>
    <div class="slide"><img src="Academy image 8.jpg"></div>
    <div class="slide"><img src="Academy image 9.jpg"></div>
    <div class="slide"><img src="Academy image 10.jpg"></div
                                                         
  </div>

  <button class="btn next">&#10095;</button>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 <span>Advanced Academy Shamli™</span> — Designed by TANISHQ with Premium Experience System</p>
</footer>

<!-- WHATSAPP -->
<a href="https://wa.me/917055557339" class="whatsapp">
<i class="fab fa-whatsapp"></i>
</a>

<script>

const track = document.getElementById("track");
const slides = document.querySelectorAll(".slide");
let index = 0;

function move(){
  track.style.transform = `translateX(-${index * 100}%)`;
}

document.querySelector(".next").onclick = ()=>{
  index = (index + 1) % slides.length;
  move();
}

document.querySelector(".prev").onclick = ()=>{
  index = (index - 1 + slides.length) % slides.length;
  move();
}

/* AUTO SLIDE */
setInterval(()=>{
  index = (index + 1) % slides.length;
  move();
},3000);

</script>

</body>
</html>
