<style>
/* ===== BODY ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #121212; /* dark but not full black */
  color: #fff;
}

/* ===== NAVBAR ===== */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 50px;
  background: #1a1a1a;
}
.navbar .logo {
  font-size: 24px;
  font-weight: bold;
  color: #fff;
}
.nav-links {
  display: flex;
  list-style: none;
}
.nav-links li a {
  color: #fff;
  text-decoration: none;
  margin-left: 20px;
  transition: color 0.3s;
}
.nav-links li a:hover {
  color: #1ed760;
}

/* ===== GALLERY BOX ===== */
.gallery {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 20px;
}

.gallery h1 {
  text-align: center;
  padding: 15px 40px;
  font-size: 36px;
  border-radius: 15px;
  animation: colorShift 6s infinite alternate;
  box-shadow: 0 0 20px #1ed760, 0 0 40px #1ed760 inset;
}

@keyframes colorShift {
  0% { background: #0f0; color: #000; box-shadow: 0 0 20px #0f0, 0 0 40px #0f0 inset;}
  25% { background: #0ff; color: #000; box-shadow: 0 0 20px #0ff, 0 0 40px #0ff inset;}
  50% { background: #ff0; color: #000; box-shadow: 0 0 20px #ff0, 0 0 40px #ff0 inset;}
  75% { background: #f0f; color: #000; box-shadow: 0 0 20px #f0f, 0 0 40px #f0f inset;}
  100% { background: #1ed760; color: #000; box-shadow: 0 0 20px #1ed760, 0 0 40px #1ed760 inset;}
}

/* ===== SLIDER ===== */
.slider {
  position: relative;
  width: 90%;
  max-width: 900px;
  height: 500px;
  margin-top: 40px;
  overflow: hidden;
  border-radius: 15px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.5);
  background: #1a1a1a;
}

.slides {
  display: flex;
  height: 100%;
  transition: transform 1s ease-in-out;
}

.slides img {
  width: 100%;
  height: 100%;
  object-fit: contain; /* ensures full image visible */
  flex-shrink: 0;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.5s, filter 0.5s;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.slides img:hover {
  transform: scale(1.03);
  filter: brightness(1.1);
}

/* ===== BUTTONS ===== */
.prev, .next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(30, 215, 96, 0.7);
  color: #fff;
  border: none;
  padding: 12px 15px;
  cursor: pointer;
  font-size: 22px;
  border-radius: 50%;
  z-index: 10;
  transition: 0.3s;
}
.prev:hover, .next:hover {
  background: rgba(30, 215, 96, 1);
}
.prev { left: 15px; }
.next { right: 15px; }

/* ===== LIGHTBOX ===== */
.lightbox {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
  z-index: 9999;
}
.lightbox img {
  max-width: 85%;
  max-height: 85%;
  border-radius: 10px;
  animation: zoomIn 0.4s ease;
  box-shadow: 0 15px 30px rgba(0,0,0,0.7);
}
.lightbox .close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 35px;
  color: white;
  cursor: pointer;
}
.light-prev, .light-next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.2);
  color: white;
  border: none;
  font-size: 35px;
  cursor: pointer;
  padding: 10px;
  border-radius: 50%;
}
.light-prev:hover, .light-next:hover {
  background: rgba(255,255,255,0.5);
}

@keyframes zoomIn {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* ===== FOOTER ===== */
footer {
  padding: 25px;
  text-align: center;
  background: #1a1a1a;
}
footer .social a {
  color: #1ed760;
  text-decoration: none;
  margin-left: 15px;
}
.whatsapp {
  position: fixed;
  bottom: 25px;
  right: 25px;
  background: #25D366;
  color: #fff;
  border-radius: 50%;
  padding: 15px;
  font-size: 22px;
  text-decoration: none;
}

/* ===== RESPONSIVE ===== */
@media(max-width: 768px) {
  .slider { height: 300px; }
  .gallery h1 { font-size: 28px; padding: 12px 25px; }
}
</style>

<script>
// ===== NAVBAR HAMBURGER =====
const hamburger = document.querySelector('.hamburger');
const navLinks = document.querySelector('.nav-links');
hamburger.addEventListener('click', () => navLinks.classList.toggle('active'));

// ===== INFINITE SLIDER =====
const slidesContainer = document.getElementById('slides-container');
const slides = Array.from(slidesContainer.children);
const prevBtn = document.querySelector('.prev');
const nextBtn = document.querySelector('.next');
let currentIndex = 0;

// Clone for seamless infinite
slides.forEach(slide => slidesContainer.appendChild(slide.cloneNode(true)));
const totalSlides = slidesContainer.children.length;

function moveToSlide(index) {
  slidesContainer.style.transition = 'transform 1s ease-in-out';
  slidesContainer.style.transform = `translateX(${-index * 100}%)`;
}

// Auto slide
let slideInterval = setInterval(() => {
  currentIndex++;
  moveToSlide(currentIndex);
  if (currentIndex >= totalSlides / 2) {
    setTimeout(() => {
      slidesContainer.style.transition = 'none';
      currentIndex = 0;
      moveToSlide(currentIndex);
    }, 1000);
  }
}, 5000);

// Buttons
nextBtn.addEventListener('click', () => {
  clearInterval(slideInterval);
  currentIndex++;
  moveToSlide(currentIndex);
  if (currentIndex >= totalSlides / 2) {
    setTimeout(() => { slidesContainer.style.transition='none'; currentIndex=0; moveToSlide(currentIndex); },1000);
  }
});

prevBtn.addEventListener('click', () => {
  clearInterval(slideInterval);
  currentIndex--;
  if (currentIndex < 0) {
    slidesContainer.style.transition='none';
    currentIndex = totalSlides / 2 - 1;
    moveToSlide(currentIndex);
    setTimeout(()=>{slidesContainer.style.transition='transform 1s ease-in-out';},50);
  } else moveToSlide(currentIndex);
});

// ===== LIGHTBOX =====
const lightbox = document.getElementById('lightbox');
const lightImg = document.getElementById('lightbox-img');
const lightClose = document.querySelector('.lightbox .close');
const lightPrev = document.querySelector('.light-prev');
const lightNext = document.querySelector('.light-next');
const originalSlides = slides.slice(0, slides.length / 2);

originalSlides.forEach((slide,i)=>slide.addEventListener('click',()=>{lightbox.style.display='flex'; lightImg.src=slide.src; currentIndex=i;}));
lightClose.addEventListener('click',()=>lightbox.style.display='none');
lightNext.addEventListener('click',()=>{currentIndex=(currentIndex+1)%originalSlides.length; lightImg.src=originalSlides[currentIndex].src;});
lightPrev.addEventListener('click',()=>{currentIndex=(currentIndex-1+originalSlides.length)%originalSlides.length; lightImg.src=originalSlides[currentIndex].src;});
lightbox.addEventListener('click',e=>{if(e.target===lightbox) lightbox.style.display='none';});
</script>
