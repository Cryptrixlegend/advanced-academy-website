<style>
/* ===== BODY & BACKGROUND ANIMATION ===== */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #111;
  color: white;
  overflow-x: hidden;
  position: relative;
}
body::before {
  content:'';
  position: fixed;
  width: 100%; height: 100%;
  background: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: moveBG 20s linear infinite;
  z-index: -1;
}
@keyframes moveBG {
  0% {background-position:0 0;}
  100% {background-position:1000px 1000px;}
}

/* ===== GALLERY SLIDER ===== */
.slider {
  position: relative;
  max-width: 800px;
  margin: 40px auto;
  overflow: hidden;
}
.slides img {
  width: 100%;
  display: none;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.5s;
  object-fit: contain; /* ensure fully visible, no cropping */
  height: auto;
}
.slides img.active { display: block; }

/* Buttons */
.prev, .next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.6);
  color: white;
  border: none;
  padding: 12px 15px;
  cursor: pointer;
  font-size: 20px;
  border-radius: 50%;
  transition: 0.3s;
}
.prev:hover, .next:hover { background: rgba(0,0,0,0.9); }
.prev { left: 10px; }
.next { right: 10px; }

/* ===== LIGHTBOX ===== */
.lightbox {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
  z-index: 9999;
}
.lightbox img {
  max-width: 85%;
  max-height: 85%;
  border-radius: 10px;
  animation: zoomIn 0.4s ease;
}
.lightbox .close {
  position: absolute;
  top: 20px; right: 30px;
  font-size: 35px; color: white;
  cursor: pointer;
}
.light-prev, .light-next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.2);
  color: white;
  border: none;
  font-size: 35px;
  cursor: pointer;
  padding: 10px;
  border-radius: 50%;
}
.light-prev:hover, .light-next:hover { background: rgba(255,255,255,0.5); }

@keyframes zoomIn {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* ===== ANIMATION SECTION FOR SECOND GALLERY ===== */
.animation-bg {
  position: relative;
  padding: 40px 0;
}
.animation-bg::before {
  content:'';
  position: absolute;
  width: 100%; height: 100%;
  top: 0; left: 0;
  background: linear-gradient(-45deg, #4F46E5, #00c6ff, #22c55e, #FACC15);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
  z-index: -1;
  opacity: 0.3;
  border-radius: 15px;
}
@keyframes gradientBG {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

/* ===== HEADER & FOOTER PRESERVED ===== */
.navbar { display:flex; justify-content:space-between; align-items:center; padding:15px 5%; background:#4F46E5; color:#fff; position:relative; }
.navbar .logo { font-size:24px; font-weight:bold; }
.nav-links { list-style:none; display:flex; gap:20px; margin:0; padding:0; }
.nav-links li a { color:#fff; text-decoration:none; font-weight:500; }
.hamburger { display:none; cursor:pointer; font-size:22px; }
footer { text-align:center; padding:20px; background:#111; color:#fff; box-shadow:0 -5px 20px rgba(0,0,0,0.5); }
.whatsapp {position:fixed;bottom:20px;right:20px;background:#22C55E;color:white;padding:15px;border-radius:50%;font-size:22px;animation:float 2s infinite;}
@keyframes float{0%{transform:translateY(0);}50%{transform:translateY(-8px);}100%{transform:translateY(0);}}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){

  .nav-links.active { display:flex; }
  .hamburger { display:block; }
}
</style>

<script>
// ===== NAVBAR HAMBURGER =====
const hamburger = document.querySelector('.hamburger');
const navLinks = document.querySelector('.nav-links');
hamburger.addEventListener('click', () => {
  navLinks.classList.toggle('active');
});

// ===== ORIGINAL GALLERY SLIDER =====
function setupSlider(sliderSelector, lightboxSelector, lightboxImgSelector){
  const slides = document.querySelectorAll(sliderSelector + ' .slide');
  const prev = document.querySelector(sliderSelector + ' .prev');
  const next = document.querySelector(sliderSelector + ' .next');
  const lightbox = document.querySelector(lightboxSelector);
  const lightImg = document.querySelector(lightboxImgSelector);
  const lightClose = lightbox.querySelector('.close');
  const lightPrev = lightbox.querySelector('.light-prev');
  const lightNext = lightbox.querySelector('.light-next');
  let currentSlide = 0;

  function showSlide(index){
    slides.forEach((slide,i)=>{
      slide.classList.toggle('active', i===index);
    });
  }

  next.addEventListener('click', ()=>{
    currentSlide = (currentSlide+1) % slides.length;
    showSlide(currentSlide);
  });

  prev.addEventListener('click', ()=>{
    currentSlide = (currentSlide-1+slides.length) % slides.length;
    showSlide(currentSlide);
  });

  slides.forEach((slide,index)=>{
    slide.addEventListener('click', ()=>{
      lightbox.style.display = 'flex';
      lightImg.src = slide.src;
      currentSlide = index;
    });
  });

  lightClose.addEventListener('click', ()=>{
    lightbox.style.display = 'none';
  });

  lightNext.addEventListener('click', ()=>{
    currentSlide = (currentSlide+1)%slides.length;
    lightImg.src = slides[currentSlide].src;
  });
  lightPrev.addEventListener('click', ()=>{
    currentSlide = (currentSlide-1+slides.length)%slides.length;
    lightImg.src = slides[currentSlide].src;
  });

  lightbox.addEventListener('click',(e)=>{
    if(e.target===lightbox) lightbox.style.display='none';
  });

  // Auto slide every 5s
  setInterval(()=>{
    currentSlide = (currentSlide+1)%slides.length;
    showSlide(currentSlide);
  },5000);
}

// Initialize both galleries
setupSlider('.gallery:first-of-type', '#lightbox', '#lightbox-img');
setupSlider('.gallery.animation-bg', '#lightbox2', '#lightbox-img2');

</script>
