<style>
/* ===== GALLERY SLIDER ===== */
.slider {
  position: relative;
  max-width: 900px;
  height: 500px; /* fixed height to avoid page jump */
  margin: 40px auto;
  overflow: hidden;
  border-radius: 15px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.3);
  background: #111;
}

.slides {
  display: flex;
  transition: transform 1s ease-in-out;
}

.slides img {
  width: 100%;
  flex-shrink: 0;
  object-fit: contain;
  cursor: pointer;
  border-radius: 10px;
  transition: transform 0.5s, filter 0.5s;
  box-shadow: 0 10px 20px rgba(0,0,0,0.4);
}

.slides img:hover {
  transform: scale(1.03);
  filter: brightness(1.1);
}

/* Buttons */
.prev, .next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.6);
  color: white;
  border: none;
  padding: 12px 15px;
  cursor: pointer;
  font-size: 20px;
  border-radius: 50%;
  transition: 0.3s;
  z-index: 10;
}

.prev:hover, .next:hover {
  background: rgba(0,0,0,0.9);
}

.prev { left: 15px; }
.next { right: 15px; }

/* ===== LIGHTBOX ===== */
.lightbox {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
  z-index: 9999;
}
.lightbox img {
  max-width: 85%;
  max-height: 85%;
  border-radius: 10px;
  animation: zoomIn 0.4s ease;
  box-shadow: 0 15px 30px rgba(0,0,0,0.5);
}
.lightbox .close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 35px;
  color: white;
  cursor: pointer;
}
.light-prev, .light-next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.2);
  color: white;
  border: none;
  font-size: 35px;
  cursor: pointer;
  padding: 10px;
  border-radius: 50%;
}
.light-prev:hover, .light-next:hover {
  background: rgba(255,255,255,0.5);
}
.light-prev { left: 20px; }
.light-next { right: 20px; }

@keyframes zoomIn {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
</style>

<script>
// ===== NAVBAR HAMBURGER =====
const hamburger = document.querySelector('.hamburger');
const navLinks = document.querySelector('.nav-links');
hamburger.addEventListener('click', () => {
  navLinks.classList.toggle('active');
});

// ===== INFINITE LOOP SLIDER =====
const slidesContainer = document.getElementById('slides-container');
const slides = Array.from(document.querySelectorAll('.slides .slide'));
const prevBtn = document.querySelector('.prev');
const nextBtn = document.querySelector('.next');

let currentIndex = 0;

// Clone slides for infinite loop
slides.forEach(slide => slidesContainer.appendChild(slide.cloneNode(true)));
const totalSlides = slidesContainer.children.length;

// Update slide transform
function moveToSlide(index) {
  const offset = -index * 100;
  slidesContainer.style.transition = 'transform 1s ease-in-out';
  slidesContainer.style.transform = `translateX(${offset}%)`;
}

// Auto-slide infinite
let slideInterval = setInterval(() => {
  currentIndex++;
  moveToSlide(currentIndex);
  // reset without animation
  if (currentIndex >= totalSlides / 2) {
    setTimeout(() => {
      slidesContainer.style.transition = 'none';
      currentIndex = 0;
      moveToSlide(currentIndex);
    }, 1000); // match transition duration
  }
}, 5000);

// Next / Prev buttons
nextBtn.addEventListener('click', () => {
  clearInterval(slideInterval);
  currentIndex++;
  moveToSlide(currentIndex);
  if (currentIndex >= totalSlides / 2) {
    setTimeout(() => {
      slidesContainer.style.transition = 'none';
      currentIndex = 0;
      moveToSlide(currentIndex);
    }, 1000);
  }
});

prevBtn.addEventListener('click', () => {
  clearInterval(slideInterval);
  currentIndex--;
  if (currentIndex < 0) {
    slidesContainer.style.transition = 'none';
    currentIndex = totalSlides / 2 - 1;
    moveToSlide(currentIndex);
    setTimeout(() => {
      slidesContainer.style.transition = 'transform 1s ease-in-out';
    }, 50);
  } else {
    moveToSlide(currentIndex);
  }
});

// ===== LIGHTBOX FUNCTIONALITY =====
const lightbox = document.getElementById('lightbox');
const lightImg = document.getElementById('lightbox-img');
const lightClose = document.querySelector('.lightbox .close');
const lightPrev = document.querySelector('.light-prev');
const lightNext = document.querySelector('.light-next');

const originalSlides = Array.from(document.querySelectorAll('.slides .slide')).slice(0, slides.length / 2);

originalSlides.forEach((slide, index) => {
  slide.addEventListener('click', () => {
    lightbox.style.display = 'flex';
    lightImg.src = slide.src;
    currentIndex = index;
  });
});

lightClose.addEventListener('click', () => { lightbox.style.display = 'none'; });
lightNext.addEventListener('click', () => {
  currentIndex = (currentIndex + 1) % originalSlides.length;
  lightImg.src = originalSlides[currentIndex].src;
});
lightPrev.addEventListener('click', () => {
  currentIndex = (currentIndex - 1 + originalSlides.length) % originalSlides.length;
  lightImg.src = originalSlides[currentIndex].src;
});

lightbox.addEventListener('click', (e) => { if(e.target === lightbox) lightbox.style.display = 'none'; });
</script>
