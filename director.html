<style>
  /* Body and background */
  body {
    margin: 0;
    padding: 0;
    font-family: 'Arial', sans-serif;
    background: #1e1e2f;
    color: #fff;
    overflow-x: hidden;
    position: relative;
  }

  /* Particle canvas */
  #particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
  }

  /* Header and Navigation */
  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #111;
    padding: 10px 20px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo {
    font-weight: bold;
    font-size: 1.3rem;
    color: #ffcc00;
  }

  .nav-links {
    list-style: none;
    display: flex;
    gap: 20px;
  }

  .nav-links li a {
    text-decoration: none;
    color: white;
    font-weight: bold;
    transition: color 0.3s;
  }

  .nav-links li a:hover {
    color: #ffcc00;
  }

  /* Hamburger menu */
  .hamburger {
    display: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: #ffcc00;
  }

  /* Responsive: Mobile menu */
  @media (max-width: 768px) {
    .nav-links {
      position: absolute;
      top: 60px;
      left: -100%;
      flex-direction: column;
      background: #111;
      width: 100%;
      text-align: center;
      transition: left 0.3s ease-in-out;
    }

    .nav-links.active {
      left: 0;
    }

    .nav-links li {
      margin: 15px 0;
    }

    .hamburger {
      display: block;
    }
  }

  /* Wrapper for image */
  .img-wrapper {
    display: inline-flex;
    justify-content: center;
    align-items: center;
    padding: 6px;
    border-radius: 10px; 
    background: #111;
    box-shadow: 0 0 20px rgba(255, 204, 0, 0.3);
  }

  .director-img {
    width: 260px;
    height: 260px;
    border-radius: 50%;
    padding: 10px;
    background: #111;
    object-fit: contain; 
    object-position: center;
    border: 4px solid #ffcc00;
    box-shadow: 0 0 20px #ffcc00;
    transition: transform 0.5s, box-shadow 0.5s;
    animation: float 4s ease-in-out infinite;
  }

  .director-img:hover {
    transform: scale(1.1);
    box-shadow: 0 0 40px #ffcc00, 0 0 80px #ff9900;
    filter: brightness(1.2);
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  .container {
    text-align: center;
    padding: 60px 20px;
  }

  /* Message box */
  .message {
    margin-top: 30px;
    font-size: 1.5rem;
    color: #fff;
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
    padding: 20px;
    border-left: 5px solid #ffcc00;
    background: rgba(255, 204, 0, 0.1);
    border-radius: 10px;
    min-height: 140px;
    position: relative;
    overflow: hidden;
  }

  .message::after {
    content: '|';
    position: absolute;
    right: 10px;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%,50%,100% { opacity: 1; }
    25%,75% { opacity: 0; }
  }

  /* Rating */
  .rating {
    margin-top: 20px;
    font-size: 2rem;
    color: gold;
    font-weight: bold;
  }
  .star {
    display: inline-block;
    animation: sparkle 1.5s infinite;
  }
  @keyframes sparkle {
    0%,100% { text-shadow: 0 0 5px gold, 0 0 15px gold; }
    50% { text-shadow: 0 0 20px #fff700, 0 0 30px #ffcc00; }
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 20px;
    background: #111;
    margin-top: 50px;
  }

  .social a {
    text-decoration: none;
    color: #ffcc00;
    margin: 0 10px;
    display: inline-block;
  }

</style>

<!-- JS: Typewriter + Particles + Hamburger -->
<script>
  // Typewriter effect
  const text = "Dear Parents, Greetings! I am Mr. Manoj Ruhela, and it gives me immense pleasure to begin this journey with our talented students. Together, we will achieve excellence and unlock every student's true potential. Let's make learning an unforgettable experience!";
  const messageEl = document.getElementById('message');
  let i = 0;
  function typeWriter() {
    if (i < text.length) {
      messageEl.innerHTML += text.charAt(i);
      i++;
      setTimeout(typeWriter, 40);
    }
  }
  window.onload = typeWriter;

  // Particle animation
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let w = canvas.width = window.innerWidth;
  let h = canvas.height = window.innerHeight;

  const particlesArray = [];
  const colors = ['#ffcc00', '#fff700', '#ff9900'];

  class Particle {
    constructor() {
      this.x = Math.random() * w;
      this.y = Math.random() * h;
      this.size = Math.random() * 3 + 1;
      this.speedX = Math.random() * 1 - 0.5;
      this.speedY = Math.random() * 1 - 0.5;
      this.color = colors[Math.floor(Math.random() * colors.length)];
    }
    update() {
      this.x += this.speedX;
      this.y += this.speedY;
      if (this.x < 0 || this.x > w) this.speedX *= -1;
      if (this.y < 0 || this.y > h) this.speedY *= -1;
    }
    draw() {
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function initParticles() {
    for (let i = 0; i < 100; i++) {
      particlesArray.push(new Particle());
    }
  }

  function animateParticles() {
    ctx.clearRect(0, 0, w, h);
    particlesArray.forEach(p => {
      p.update();
      p.draw();
    });
    requestAnimationFrame(animateParticles);
  }

  window.addEventListener('resize', () => {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  });

  initParticles();
  animateParticles();

  // Hamburger toggle
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.getElementById('navLinks');
  hamburger.addEventListener('click', () => {
    navLinks.classList.toggle('active');
  });

</script>
