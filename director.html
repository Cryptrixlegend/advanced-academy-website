<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Director - Mr. Manoj Ruhela</title>
<style>
  /* Body and background */
  body {
    margin: 0;
    padding: 0;
    font-family: 'Arial', sans-serif;
    background: #1e1e2f;
    color: #fff;
    overflow-x: hidden;
    position: relative;
  }

  /* Particle canvas */
  #particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
  }

  /* Navigation */
  .nav-links {
    list-style: none;
    display: flex;
    justify-content: center;
    background: #111;
    padding: 10px 0;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .nav-links li { margin: 0 15px; }
  .nav-links a {
    text-decoration: none;
    color: white;
    font-weight: bold;
    transition: color 0.3s;
  }
  .nav-links a:hover { color: #ffcc00; }

/* Wrapper for image */
.img-wrapper {
  display: inline-flex; /* better centering */
  justify-content: center;
  align-items: center;
  padding: 6px;
  border-radius: 50%;
  background: conic-gradient(#ffcc00, #ff9900, #fff700, #ffcc00);
  animation: rotateRing 4s linear infinite;
}

/* Rotation animation */
@keyframes rotateRing {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}


.container {
  text-align: center;
  padding: 60px 20px;
}
  /* Director image */
.director-img {
  width: 260px;
  height: 260px;
  border-radius: 50%;
  padding: 10px;
  background: #111;
  object-fit: contain; 
  object-position: center;
  border: 4px solid #ffcc00;
  box-shadow: 0 0 20px #ffcc00;
  transition: transform 0.5s, box-shadow 0.5s;
  animation: float 4s ease-in-out infinite;
}

.director-img:hover {
  transform: scale(1.1);
  box-shadow: 0 0 40px #ffcc00, 0 0 80px #ff9900;
  filter: brightness(1.2);
}

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  /* Message box */
  .message {
    margin-top: 30px;
    font-size: 1.5rem;
    color: #fff;
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
    padding: 20px;
    border-left: 5px solid #ffcc00;
    background: rgba(255, 204, 0, 0.1);
    border-radius: 10px;
    min-height: 140px;
    position: relative;
    overflow: hidden;
  }

  .message::after {
    content: '|';
    position: absolute;
    right: 10px;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%,50%,100% { opacity: 1; }
    25%,75% { opacity: 0; }
  }

  /* Rating */
  .rating {
    margin-top: 20px;
    font-size: 2rem;
    color: gold;
    font-weight: bold;
  }
  .star {
    display: inline-block;
    animation: sparkle 1.5s infinite;
  }
  @keyframes sparkle {
    0%,100% { text-shadow: 0 0 5px gold, 0 0 15px gold; }
    50% { text-shadow: 0 0 20px #fff700, 0 0 30px #ffcc00; }
  }
</style>
</head>
<body>

<!-- Particle Canvas -->
<canvas id="particles"></canvas>

<!-- Navigation -->
<ul class="nav-links">
  <li><a href="index.html">Home</a></li>
  <li><a href="about.html">About</a></li>
  <li><a href="courses.html">Courses</a></li>
  <li><a href="results.html">Results</a></li>
  <li><a href="teachers.html">Teachers</a></li>
  <li><a href="gallery.html">Gallery</a></li>
  <li><a href="reviews.html">Students Reviews</a></li>
  <li><a href="Administration.html">Administration</a></li>
  <li><a href="director.html">Director</a></li>
  <li><a href="admission.html">Admission</a></li>
  <li><a href="contact.html">Contact</a></li>
</ul>

<div class="container">

  <div class="img-wrapper">
    <img src="IMG-20260407-WA0175.jpg" alt="Mr. Manoj Ruhela" class="director-img">
  </div>

  <div class="message" id="message"></div>

  <div class="rating" id="rating">
    <span class="star">⭐</span><span class="star">⭐</span>
    <span class="star">⭐</span><span class="star">⭐</span>
    <span class="star">⭐</span> 5/5
  </div>

</div>

<!-- JS: Typewriter + Particles -->
<script>
  // Typewriter effect
  const text = "Dear Parents, Greetings! I am Mr. Manoj Ruhela, and it gives me immense pleasure to begin this journey with our talented students. Together, we will achieve excellence and unlock every student's true potential. Let's make learning an unforgettable experience!";
  const messageEl = document.getElementById('message');
  let i = 0;
  function typeWriter() {
    if (i < text.length) {
      messageEl.innerHTML += text.charAt(i);
      i++;
      setTimeout(typeWriter, 40);
    }
  }
  window.onload = typeWriter;

  // Particle animation
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let w = canvas.width = window.innerWidth;
  let h = canvas.height = window.innerHeight;

  const particlesArray = [];
  const colors = ['#ffcc00', '#fff700', '#ff9900'];

  class Particle {
    constructor() {
      this.x = Math.random() * w;
      this.y = Math.random() * h;
      this.size = Math.random() * 3 + 1;
      this.speedX = Math.random() * 1 - 0.5;
      this.speedY = Math.random() * 1 - 0.5;
      this.color = colors[Math.floor(Math.random() * colors.length)];
    }
    update() {
      this.x += this.speedX;
      this.y += this.speedY;
      if (this.x < 0 || this.x > w) this.speedX *= -1;
      if (this.y < 0 || this.y > h) this.speedY *= -1;
    }
    draw() {
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function initParticles() {
    for (let i = 0; i < 100; i++) {
      particlesArray.push(new Particle());
    }
  }

  function animateParticles() {
    ctx.clearRect(0, 0, w, h);
    particlesArray.forEach(p => {
      p.update();
      p.draw();
    });
    requestAnimationFrame(animateParticles);
  }

  window.addEventListener('resize', () => {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  });

  initParticles();
  animateParticles();
</script>

</body>
</html>
