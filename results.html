<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Advanced Academy</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ===== BODY ===== */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #111; 
  color: white;
  overflow-x: hidden;
  position: relative;
}

body::before {
  content:'';
  position:fixed;
  width:100%; height:100%;
  background:radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size:50px 50px;
  animation: moveBG 20s linear infinite;
  z-index:-1;
}
@keyframes moveBG { 0% {background-position:0 0;} 100% {background-position:1000px 1000px;} }

/* ===== NAVBAR ===== */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 5%;
  background: #4F46E5; 
  color: #fff;
  position: relative;
  z-index: 100;
}

.logo {
  font-size: 24px;
  font-weight: bold;
}

.nav-links {
  list-style: none;
  display: flex;
  gap: 20px;
  margin: 0;
  padding: 0;
}

.nav-links li a {
  color: #fff;
  text-decoration: none;
  font-weight: 500;
}

.hamburger {
  display: none;
  cursor: pointer;
  font-size: 22px;
}

/* ===== HERO ===== */
.hero {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 250px;
  background: linear-gradient(-45deg, #4F46E5, #00c6ff, #22c55e, #FACC15);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
  overflow: hidden;
  border-radius: 20px;
  margin: 20px 5%;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  text-align: center;
  color: white;
  font-size: 28px;
  font-weight: bold;
}

@keyframes gradientBG { 
  0% { background-position:0% 50%; } 
  50% { background-position:100% 50%; } 
  100% { background-position:0% 50%; } 
}

/* ===== BANNER ===== */
.banner {
  text-align: center;
  padding: 40px 20px;
  color: gold;
  font-size: 22px;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%, 50%, 100% { opacity: 1; }
  25%, 75% { opacity: 0.3; }
}

/* ===== CONTACT FORM ===== */
.contact-section {
  max-width: 700px;
  margin: 40px auto;
  padding: 20px 5%;
  background: #1e1e2f;
  border-radius: 15px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.5);
}

.contact-section h2 {
  text-align: center;
  margin-bottom: 25px;
  color: #4F46E5;
}

.contact-section form {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.contact-section input,
.contact-section textarea {
  padding: 12px;
  border-radius: 8px;
  border: none;
  outline: none;
  font-size: 16px;
}

.contact-section button {
  padding: 12px;
  background: #4F46E5;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 18px;
  cursor: pointer;
  transition: transform 0.3s ease;
}

.contact-section button:hover {
  transform: scale(1.05);
}

/* ===== FOOTER ===== */
footer {
  text-align: center;
  padding: 20px;
  background: #111;
  color: #fff;
  box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
  font-size: 14px;
}

/* ===== WHATSAPP BUTTON ===== */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #22C55E;
  padding: 15px;
  border-radius: 50%;
  color: white;
  font-size: 22px;
  text-align: center;
  animation: float 2s infinite;
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
  100% { transform: translateY(0); }
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .nav-links { display:none; flex-direction:column; background:#4F46E5; position:absolute; top:60px; right:0; width:200px; padding:15px; border-radius:0 0 8px 8px; }
  .nav-links.active { display:flex; }
  .hamburger { display:block; }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<header>
<nav class="navbar">
  <div class="logo">Advanced Academy</div>
  <ul class="nav-links">
   <li><a href="index.html">Home</a></li>
   <li><a href="about.html">About</a></li>
   <li><a href="courses.html">Courses</a></li>
   <li><a href="faculty.html">Faculty</a></li>
   <li><a href="results.html">Results</a></li>
   <li><a href="gallery.html">Gallery</a></li>
   <li><a href="reviews.html">Students Reviews</a></li>
   <li><a href="contact.html">Contact</a></li>
  </ul>
  <div class="hamburger"><i class="fas fa-bars"></i></div>
</nav>
</header>

<!-- HERO -->
<div class="hero">
  Contact Us
</div>

<!-- BANNER -->
<section class="banner">
  We are here to help you! 💬
</section>

<!-- CONTACT FORM -->
<section class="contact-section">
  <h2>Send Us a Message</h2>
  <form>
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Your Email" required>
    <input type="text" placeholder="Subject" required>
    <textarea rows="5" placeholder="Your Message" required></textarea>
    <button type="submit">Submit</button>
  </form>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 Advanced Academy Shamli™</p>
  <p>® Designed & Created by <strong>TANISHQ</strong></p>
</footer>

<!-- WHATSAPP -->
<a href="https://wa.me/917055557339" class="whatsapp" target="_blank">
  <i class="fab fa-whatsapp"></i>
</a>

<!-- JS for Hamburger -->
<script>
const hamburger = document.querySelector('.hamburger');
const navLinks = document.querySelector('.nav-links');

hamburger.addEventListener('click', () => {
  navLinks.classList.toggle('active');
});
</script>

</body>
</html>
