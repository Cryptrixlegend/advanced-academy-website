<style>
/* ===== FLOATING AI CHAT BOT ===== */
#ai-chat-icon {
  position: fixed;
  bottom: 90px;
  right: 20px;
  background: #4F46E5;
  color: #fff;
  border-radius: 50%;
  width: 60px;
  height: 60px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size: 28px;
  cursor:pointer;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  animation: pulse 2s infinite;
  z-index: 9999;
}

@keyframes pulse {
  0% { transform: scale(1); box-shadow: 0 0 0 rgba(79,70,229,0.7); }
  50% { transform: scale(1.1); box-shadow: 0 0 15px rgba(79,70,229,0.9); }
  100% { transform: scale(1); box-shadow: 0 0 0 rgba(79,70,229,0.7); }
}

/* Chat Modal */
#ai-chat-modal {
  position: fixed;
  bottom: 160px;
  right: 20px;
  width: 300px;
  max-height: 400px;
  background: linear-gradient(135deg, #fff, #f0f0ff);
  border-radius: 15px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
  display: none;
  flex-direction: column;
  overflow: hidden;
  z-index: 9999;
  animation: slideUp 0.4s ease;
  border: 2px solid #4F46E5;
}

/* Glowing box effect */
#ai-chat-modal::before {
  content: '';
  position: absolute;
  top:0; left:0; right:0; bottom:0;
  border-radius: 15px;
  background: linear-gradient(270deg, #4F46E5, #6B5BFF, #4F46E5);
  z-index:-1;
  filter: blur(20px);
  animation: glow 3s linear infinite;
}

@keyframes glow {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

@keyframes slideUp {
  0% {transform: translateY(20px); opacity:0;}
  100% {transform: translateY(0); opacity:1;}
}

/* Chat Header */
#ai-chat-modal .chat-header {
  background:#4F46E5;
  color:#fff;
  padding:10px;
  font-weight:bold;
  text-align:center;
  display:flex;
  align-items:center;
  gap:10px;
}
#ai-chat-modal .chat-header img {
  width:40px;
  height:auto;
  border-radius:50%;
}

/* Chat Body */
#ai-chat-modal .chat-body {
  padding:10px;
  flex:1;
  overflow-y:auto;
}

/* Messages */
#ai-chat-modal .message {
  margin-bottom:10px;
  padding:8px 12px;
  border-radius:12px;
  max-width:80%;
  animation: fadeIn 0.3s ease;
}
#ai-chat-modal .bot-message { background:#E0E0FF; align-self:flex-start; color:#000; }
#ai-chat-modal .user-message { background:#4F46E5; color:#fff; align-self:flex-end; }

/* Chat Input */
#ai-chat-modal .chat-input {
  display:flex;
  border-top:1px solid #ccc;
}
#ai-chat-modal input {
  flex:1;
  padding:8px 10px;
  border:none;
  outline:none;
  border-radius:0 0 0 15px;
}
#ai-chat-modal button {
  background:#4F46E5;
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:0 0 15px 0;
  cursor:pointer;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

/* Loader */
#quantum-loader {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  opacity:1;
  transition: opacity 0.5s ease;
}

<script>
// Loader fix – ORIGINAL working sequence restored
window.addEventListener('load', () => {
  const loader = document.getElementById('quantum-loader');
  loader.style.opacity = '0';
  setTimeout(() => { loader.style.display='none'; }, 500);
});

// Hamburger toggle
const hamburger = document.querySelector('.hamburger');
const navLinks = document.querySelector('.nav-links');
hamburger.addEventListener('click', () => { navLinks.classList.toggle('active'); });

// AI Chat Bot
const chatIcon = document.getElementById('ai-chat-icon');
const chatModal = document.getElementById('ai-chat-modal');
const chatBody = document.getElementById('chat-body');
const chatInput = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');

chatIcon.addEventListener('click', () => {
  chatModal.style.display = (chatModal.style.display === 'flex') ? 'none' : 'flex';
});

// Predefined FAQ
const faq = {
  "courses": "We offer Spoken English, Class 9-10 foundation, Class 11-12 Science, Board Exam Preparation & Competitive Exams.",
  "admission": "Admission process: Fill form → Submit docs → Pay fees → Start classes. Contact us for exact dates.",
  "contact": "Call us at +91 7055557339 or visit Mazra Road, Shamli, Uttar Pradesh.",
  "faculty": "Our Director: Mr. Manoj Ruhela. Sub-Director: Mr. Ram Kumar. Manager: Mr. Lokender Panchal.",
  "timings": "Classes run from 9 AM to 6 PM Monday to Saturday."
};

function addMessage(message, sender) {
  const div = document.createElement('div');
  div.classList.add('message', sender==='user'?'user-message':'bot-message');
  div.innerHTML = message;
  chatBody.appendChild(div);
  chatBody.scrollTop = chatBody.scrollHeight;
}

function botReply(userMsg) {
  userMsg = userMsg.toLowerCase();
  let reply = "Sorry, I didn't understand. Please ask about courses, admission, contact, faculty, or timings.";
  for(let key in faq){
    if(userMsg.includes(key)){ reply = faq[key]; break; }
  }
  addMessage(reply,'bot');
}

sendBtn.addEventListener('click', ()=>{
  const msg = chatInput.value.trim();
  if(msg==="") return;
  addMessage(msg,'user');
  botReply(msg);
  chatInput.value = '';
});

chatInput.addEventListener('keypress',(e)=>{
  if(e.key==='Enter') sendBtn.click();
});
</script>
